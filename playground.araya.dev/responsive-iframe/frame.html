<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      The embedded document opts into responsive sizing with this meta element.
      It must appear before the body opens, otherwise the responsive embedded
      sizing flag is set to false and frame-sizing has no effect (and
      window.requestResize() would throw a NotAllowedError).
    -->
    <meta name="responsive-embedded-sizing" />
    <title>embedded document</title>
    <style>
      body {
        margin: 0;
        padding: 1rem;
        font-family: system-ui, sans-serif;
        background: #f5f7ff;
        box-sizing: border-box;
      }

      button {
        margin-block: 0.5rem;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
      }

      .item {
        margin: 0.4rem 0;
        padding: 0.6rem;
        background: #fff;
        border: 1px solid #ccd;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h2>Embedded document</h2>
    <p>This is a separate document rendered inside the iframe.</p>

    <div>
      <button id="add" type="button">Add item</button>
      <button id="remove" type="button">Remove item</button>
    </div>

    <div id="list"></div>

    <script>
      const list = document.getElementById("list");
      let count = 0;

      // Ask the parent iframe to re-measure whenever the content height changes.
      // When frame-sizing: content-height is active, window.requestResize() updates the
      // parent's iframe element height. Do NOT name this wrapper requestResize:
      // a top-level function declaration becomes window.requestResize and would
      // shadow the native method (and recurse infinitely when it is absent).
      function triggerResize() {
        if (typeof window.requestResize === "function") {
          window.requestResize();
        }
      }

      function addItem() {
        count += 1;
        const el = document.createElement("div");
        el.className = "item";
        el.textContent = `Item #${count}`;
        list.appendChild(el);
        triggerResize();
      }

      function removeItem() {
        const last = list.lastElementChild;
        if (last) {
          last.remove();
          triggerResize();
        }
      }

      document.getElementById("add").addEventListener("click", addItem);
      document.getElementById("remove").addEventListener("click", removeItem);

      // Seed a few items for the initial render.
      for (let i = 0; i < 3; i += 1) {
        addItem();
      }
    </script>
  </body>
</html>
