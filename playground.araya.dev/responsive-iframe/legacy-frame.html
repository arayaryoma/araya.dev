<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>legacy embedded document</title>
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        padding: 1rem;
        font-family: system-ui, sans-serif;
        background: #fff8e1;
        box-sizing: border-box;
      }
      button {
        margin-block: 0.5rem;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
      }
      .item {
        margin: 0.4rem 0;
        padding: 0.6rem;
        background: #fff;
        border: 1px solid #e0c060;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h2>埋め込みドキュメント（legacy）</h2>
    <p>高さは postMessage / 直接計測で親へ伝えます。</p>

    <div>
      <button id="add" type="button">項目を追加</button>
      <button id="remove" type="button">項目を削除</button>
    </div>
    <div id="list"></div>

    <script>
      const params = new URLSearchParams(location.search);
      // silent=1 のときは高さ通知をしない（same-origin / aspect デモ用）
      const silent = params.get("silent") === "1";

      const list = document.getElementById("list");
      let count = 0;

      function notifyHeight() {
        if (silent) {
          return;
        }
        const height =
          document.documentElement.scrollHeight || document.body.scrollHeight;
        // 本来は postMessage の第2引数に親のオリジンを指定すること
        parent.postMessage({ type: "iframe-height", height }, "*");
      }

      function addItem() {
        count += 1;
        const el = document.createElement("div");
        el.className = "item";
        el.textContent = `項目 #${count}`;
        list.appendChild(el);
      }

      function removeItem() {
        const last = list.lastElementChild;
        if (last) {
          last.remove();
        }
      }

      document.getElementById("add").addEventListener("click", addItem);
      document.getElementById("remove").addEventListener("click", removeItem);

      // 高さ変化を監視して自動で親へ通知（ハックの肝）
      if (!silent && "ResizeObserver" in window) {
        const ro = new ResizeObserver(() => notifyHeight());
        ro.observe(document.documentElement);
      }

      for (let i = 0; i < 3; i += 1) {
        addItem();
      }
      // 初期ロード時にも通知
      window.addEventListener("load", notifyHeight);
    </script>
  </body>
</html>
