<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>legacy embedded document</title>
    <style>
      html,
      body {
        margin: 0;
      }
      body {
        padding: 1rem;
        font-family: system-ui, sans-serif;
        background: #fff8e1;
        box-sizing: border-box;
      }
      button {
        margin-block: 0.5rem;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
      }
      .item {
        margin: 0.4rem 0;
        padding: 0.6rem;
        background: #fff;
        border: 1px solid #e0c060;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h2>Embedded document (legacy)</h2>
    <p>
      Reports its height to the parent via postMessage / direct measurement.
    </p>

    <div>
      <button id="add" type="button">Add item</button>
      <button id="remove" type="button">Remove item</button>
    </div>
    <div id="list"></div>

    <script>
      const params = new URLSearchParams(location.search);
      // With silent=1, do not report height (for the same-origin / aspect demos).
      const silent = params.get("silent") === "1";

      const list = document.getElementById("list");
      let count = 0;

      function notifyHeight() {
        if (silent) {
          return;
        }
        const height =
          document.documentElement.scrollHeight || document.body.scrollHeight;
        // In production, pass the parent's origin as the second postMessage arg.
        parent.postMessage({ type: "iframe-height", height }, "*");
      }

      function addItem() {
        count += 1;
        const el = document.createElement("div");
        el.className = "item";
        el.textContent = `Item #${count}`;
        list.appendChild(el);
      }

      function removeItem() {
        const last = list.lastElementChild;
        if (last) {
          last.remove();
        }
      }

      document.getElementById("add").addEventListener("click", addItem);
      document.getElementById("remove").addEventListener("click", removeItem);

      // Watch height changes and report them automatically (the core of the hack).
      if (!silent && "ResizeObserver" in window) {
        const ro = new ResizeObserver(() => notifyHeight());
        ro.observe(document.documentElement);
      }

      for (let i = 0; i < 3; i += 1) {
        addItem();
      }
      // Also report on initial load.
      window.addEventListener("load", notifyHeight);
    </script>
  </body>
</html>
